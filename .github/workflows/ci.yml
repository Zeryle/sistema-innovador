# ============================================================================
# AutoTaller CI pipeline
# ============================================================================
# Triggered on every push and pull request to main. Runs:
#   1. Backend unit + integration tests with H2
#   2. Angular production build
#   3. Backend jar assembly (verifies the multi-stage Dockerfile targets)
#
# On a tagged release (v*), additionally builds & pushes OCI images to
# GitHub Container Registry under ghcr.io/<owner>/<image>.
# ============================================================================

name: ci

on:
  push:
    branches: [main, master]
    tags:    ['v*']
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  # -----------------------------------------------------------------------
  # 1. Backend tests (Maven + JUnit5 + H2 in-memory)
  # -----------------------------------------------------------------------
  backend-test:
    name: Backend tests (H2)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache frontend Angular build
        uses: actions/cache@v4
        with:
          path: frontend/dist
          key:  angular-dist-${{ hashFiles('frontend/package.json', 'frontend/pnpm-lock.yaml') }}

      - name: Build frontend (pnpm)
        working-directory: frontend
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run backend tests
        run: ./mvnw -B verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: target/site/jacoco
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # 2. Backend image build (validates Dockerfile syntax & full build)
  # -----------------------------------------------------------------------
  backend-image:
    name: Backend Docker image
    runs-on: ubuntu-latest
    needs: backend-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ghcr.io/zeryle/autotaller-backend:latest
            ghcr.io/zeryle/autotaller-backend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # -----------------------------------------------------------------------
  # 3. Frontend image build (validates nginx-spa.conf + pnpm build)
  # -----------------------------------------------------------------------
  frontend-image:
    name: Frontend Docker image
    runs-on: ubuntu-latest
    needs: backend-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ghcr.io/zeryle/autotaller-frontend:latest
            ghcr.io/zeryle/autotaller-frontend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max