spring.application.name=sistema-innovador

server.port=8586

# Default to dev profile (H2 in-memory) — use 'mysql' profile for MySQL
spring.profiles.active=dev

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false


# ====================================================================
# WhatsApp Cloud API (Meta) — production-ready config (currently mock mode)
# --------------------------------------------------------------------
# whatsapp.meta.mode = "mock" (default) uses MockWhatsAppGateway and logs
# every send. Set to "live" to switch to MetaCloudApiAdapter (stub for now;
# once you drop in a real HTTP client it will hit graph.facebook.com).
#
# To enable live mode you also need:
#   1. A Meta Business App with the WhatsApp product installed.
#   2. A permanent system-user access token (Settings -> System Users).
#   3. The 15-digit phone number ID assigned to your test number.
#   4. The 15-digit WhatsApp Business Account ID.
#   5. The webhook configured in the Meta dashboard pointing at
#      https://<your-host>/api/webhook/whatsapp, with a verify token
#      that matches whatsapp.meta.verify-token below.
# ====================================================================
whatsapp.meta.mode=${WHATSAPP_MODE:mock}
whatsapp.meta.access-token=${WHATSAPP_TOKEN:}
whatsapp.meta.phone-number-id=${WHATSAPP_PHONE_ID:}
whatsapp.meta.business-account-id=${WHATSAPP_BUSINESS_ID:}
whatsapp.meta.api-version=${WHATSAPP_API_VERSION:v20.0}
whatsapp.meta.verify-token=${WHATSAPP_VERIFY_TOKEN:auto-taller-demo-verify}
