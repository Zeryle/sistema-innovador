# H2 Database for local development
spring.datasource.url=jdbc:h2:mem:autotaller;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=YEAR
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at http://localhost:8585/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA (dialect auto-detected by Hibernate 6)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
