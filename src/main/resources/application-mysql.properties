# MySQL Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/autotaller?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA for MySQL (dialect auto-detected by Hibernate 6)
spring.jpa.hibernate.ddl-auto=update
