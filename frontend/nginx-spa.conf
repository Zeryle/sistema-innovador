# SPA fallback — Angular Router needs every unknown route to be served
# the index.html. Static assets (chunks, css, fonts) are served normally.
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript
               image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Long-cache hashed bundles emitted by Angular
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpe?g|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # OpenAPI proxy: when this container runs alongside the backend
    # via docker-compose, /api/* is forwarded to the backend service.
    location /api/ {
        proxy_pass         http://backend:8586;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Anything else → index.html (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}